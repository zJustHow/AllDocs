# Deploy AllDocs to Alibaba Cloud ECS (or any Linux host with Docker).
#
# First-time server setup:
#   git clone <repo> /opt/alldocs && cd /opt/alldocs
#   bash scripts/server-bootstrap.sh --generate-secrets
#   vim .env   # set LLM_API_KEY
#   bash scripts/server-bootstrap.sh --start
#
# GitHub repository secrets (Settings → Secrets and variables → Actions):
#   ECS_HOST        Public IP or domain of the server
#   ECS_USER        SSH user, e.g. root or ubuntu
#   ECS_SSH_KEY     Private key (full PEM content)
#
# Optional repository variables:
#   ECS_DEPLOY_PATH   Default: /opt/alldocs
#   ECS_SSH_PORT      Default: 22

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r backend/requirements-test.txt

      - name: Run tests
        working-directory: backend
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -q

  deploy:
    needs: [frontend-test, backend-test]
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
          ECS_SSH_PORT: ${{ vars.ECS_SSH_PORT || '22' }}
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${ECS_HOST:-}" ]] || missing+=("ECS_HOST")
          [[ -n "${ECS_SSH_KEY:-}" ]] || missing+=("ECS_SSH_KEY")
          if ((${#missing[@]} > 0)); then
            echo "::error::Missing GitHub Actions secrets: ${missing[*]}"
            echo "Add them under Settings → Secrets and variables → Actions."
            echo "Also set ECS_USER before the rsync step."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$ECS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          if ! grep -q 'BEGIN .*PRIVATE KEY' ~/.ssh/id_rsa; then
            echo "::error::ECS_SSH_KEY does not look like a PEM private key."
            echo "Paste the full key, including -----BEGIN ... PRIVATE KEY----- lines."
            exit 1
          fi

          echo "Fetching host key from ${ECS_HOST}:${ECS_SSH_PORT} ..."
          if ! ssh-keyscan -T 30 -H -p "$ECS_SSH_PORT" "$ECS_HOST" >> ~/.ssh/known_hosts 2>&1; then
            echo "::error::Could not reach SSH on ${ECS_HOST}:${ECS_SSH_PORT}."
            echo "Check: ECS security group allows inbound TCP ${ECS_SSH_PORT} from 0.0.0.0/0 (or GitHub Actions IPs), sshd is running, and ECS_HOST is the public IP/domain."
            exit 1
          fi

      - name: Sync project files
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_SSH_PORT: ${{ vars.ECS_SSH_PORT || '22' }}
          ECS_DEPLOY_PATH: ${{ vars.ECS_DEPLOY_PATH || '/opt/alldocs' }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o ServerAliveInterval=30 -o ServerAliveCountMax=120 -o TCPKeepAlive=yes"
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '.env' \
            --exclude 'node_modules/' \
            --exclude 'frontend/node_modules/' \
            --exclude 'models/' \
            -e "ssh -p ${ECS_SSH_PORT} ${SSH_OPTS}" \
            ./ "${ECS_USER}@${ECS_HOST}:${ECS_DEPLOY_PATH}/"

      - name: Build and start containers
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_SSH_PORT: ${{ vars.ECS_SSH_PORT || '22' }}
          ECS_DEPLOY_PATH: ${{ vars.ECS_DEPLOY_PATH || '/opt/alldocs' }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o ServerAliveInterval=30 -o ServerAliveCountMax=120 -o TCPKeepAlive=yes"
          SSH_TARGET="${ECS_USER}@${ECS_HOST}"
          DEPLOY_SCRIPT="${ECS_DEPLOY_PATH}/scripts/remote_compose_deploy.sh"

          for attempt in 1 2 3; do
            ssh -p "$ECS_SSH_PORT" $SSH_OPTS "$SSH_TARGET" \
              "chmod +x '${DEPLOY_SCRIPT}' && bash '${DEPLOY_SCRIPT}' start"

            for poll in $(seq 1 120); do
              status="$(ssh -p "$ECS_SSH_PORT" $SSH_OPTS "$SSH_TARGET" \
                "bash '${DEPLOY_SCRIPT}' status" 2>/dev/null || true)"
              case "$status" in
                running)
                  if (( poll % 2 == 0 )); then
                    echo "--- deploy log (tail) ---"
                    ssh -p "$ECS_SSH_PORT" $SSH_OPTS "$SSH_TARGET" \
                      "bash '${DEPLOY_SCRIPT}' log 40" || true
                  fi
                  sleep 30
                  ;;
                succeeded)
                  echo "docker compose build and start succeeded"
                  exit 0
                  ;;
                failed)
                  echo "docker compose build failed (attempt ${attempt}/3)"
                  sleep 3
                  ssh -p "$ECS_SSH_PORT" $SSH_OPTS "$SSH_TARGET" \
                    "bash '${DEPLOY_SCRIPT}' diagnostics" || true
                  echo "--- deploy log (last 200 lines) ---"
                  ssh -p "$ECS_SSH_PORT" $SSH_OPTS "$SSH_TARGET" \
                    "bash '${DEPLOY_SCRIPT}' log 200" || true
                  break
                  ;;
                *)
                  echo "unexpected deploy status: ${status:-<empty>}"
                  sleep 3
                  ssh -p "$ECS_SSH_PORT" $SSH_OPTS "$SSH_TARGET" \
                    "bash '${DEPLOY_SCRIPT}' diagnostics" || true
                  ssh -p "$ECS_SSH_PORT" $SSH_OPTS "$SSH_TARGET" \
                    "bash '${DEPLOY_SCRIPT}' log 200" || true
                  break
                  ;;
              esac
            done

            echo "retrying deploy in 30s ..."
            sleep 30
          done
          exit 1

      - name: Verify API health
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_SSH_PORT: ${{ vars.ECS_SSH_PORT || '22' }}
          ECS_DEPLOY_PATH: ${{ vars.ECS_DEPLOY_PATH || '/opt/alldocs' }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o ServerAliveInterval=30 -o ServerAliveCountMax=120 -o TCPKeepAlive=yes"
          ssh -p "$ECS_SSH_PORT" $SSH_OPTS "${ECS_USER}@${ECS_HOST}" bash -s <<EOF
          set -euo pipefail
          cd '${ECS_DEPLOY_PATH}'
          for i in \$(seq 1 60); do
            if docker compose -f docker-compose.prod.yml exec -T api \
              python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)" >/dev/null 2>&1; then
              echo "API health check passed"
              exit 0
            fi
            sleep 5
          done
          echo "API health check timed out"
          docker compose -f docker-compose.prod.yml ps
          docker compose -f docker-compose.prod.yml logs --tail=80 api worker
          exit 1
          EOF
