# Production stack for AllDocs.
#
# Usage:
#   cp .env.example .env   # set LLM_API_KEY, POSTGRES_PASSWORD, MINIO_* secrets
#   bash scripts/download_piper_models.sh models/piper
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Required .env (in addition to .env.example defaults):
#   POSTGRES_PASSWORD=<strong password>   # must match POSTGRES_URL / POSTGRES_URL_SYNC
#   MINIO_ACCESS_KEY=<access key>           # must match MINIO_ROOT_USER below
#   MINIO_SECRET_KEY=<secret key>           # must match MINIO_ROOT_PASSWORD below
#
# Only frontend is exposed publicly (default port 80). API is reached via nginx /api and /ws.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alldocs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-alldocs}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.1
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  elasticsearch:
    build:
      context: ./docker/elasticsearch
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in .env}
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      tags:
        - alldocs-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - model_cache:/root/.cache
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_started
    command:
      - uvicorn
      - "app.main:app"
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  worker:
    image: alldocs-backend
    pull_policy: never
    restart: unless-stopped
    env_file: .env
    volumes:
      - model_cache:/root/.cache
      - ./models:/app/models
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_started
    command:
      - celery
      - -A
      - app.workers.celery_app
      - worker
      - --loglevel=info
      - --concurrency=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data:
  elasticsearch_data:
  minio_data:
  model_cache:
